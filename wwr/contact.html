<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Akello Fatuma Kedrine">
    <meta name="description"
      content="Contact Wild Wave Rafting Co. for rafting reservations, questions, or website feedback.">
    <title>Wild Wave Rafting Co. | Contact Us</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-oars.png" alt="WWR Logo" class="logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>White Water Rafting Company</h1>

        <section class="contact-info">
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-grid">

            <div class="map">
                <iframe src="https://www.google.com/maps?q=kolob+utah&output=embed" width="400"
                  height="300" loading="lazy">
                </iframe>
            </div>

            <div class="form">
                <form>

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <p>Message Purpose</p>

                    <input type="radio" id="general" name="purpose" value="general">
                    <label for="general">General Inquiry</label>

                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label>

                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>

                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>

                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please subscribe me to the monthly newsletter</label>

                    <button type="submit">Send Message</button>

                </form>
            </div>

        </section>

        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/manager.jpg" alt="River Guide">
                    <figcaption>James Charles | Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/ceo.jpg" alt="Safety Instructor">
                    <figcaption>Alice Kenya | CEO</figcaption>
                </figure>

                <figure>
                    <img src="images/human_resource.jpg" alt="Trip Manager">
                    <figcaption>Milbert Cones | HR</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Wild Wave Rafting Co. - Akello Fatuma Kedrine</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
        </nav>

    </footer>

</body>

</html>
